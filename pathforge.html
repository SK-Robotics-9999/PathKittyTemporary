<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PathForge — FRC Path Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:#09050e;color:#f8edff;font-family:'Inter',sans-serif;}
  #app{display:flex;height:100vh;width:100vw;}
  #sidebar{width:230px;min-width:230px;background:#09050d;border-right:1px solid #2d0d2c;display:flex;flex-direction:column;z-index:10;}
  #sidebar-header{padding:14px 16px 10px;border-bottom:1px solid #2d0d2c;}
  #sidebar-header h1{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#f472b6;letter-spacing:0.08em;text-transform:uppercase;}
  #sidebar-header p{font-size:10px;color:#b297c9;margin-top:2px;font-family:'JetBrains Mono',monospace;}
  #tools{padding:10px 10px 8px;border-bottom:1px solid #2d0d2c;}
  .tool-label{font-size:9px;color:#b295c6;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
  .tool-row{display:flex;gap:4px;flex-wrap:wrap;}
  .tool-btn{flex:1;min-width:58px;padding:6px 4px;background:#120819;border:1px solid #2d0d2c;border-radius:5px;color:#d8c9e9;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;text-align:center;transition:all 0.15s;}
  .tool-btn:hover{background:#2a0f33;border-color:#f472b6;color:#f9c1e9;}
  .tool-btn.active{background:#40143f;border-color:#f472b6;color:#f9a8d4;}
  .tool-btn.danger{color:#fb7185;}
  .tool-btn.danger:hover{background:#300712;border-color:#fb7185;color:#fb7185;}
  #pose-list{flex:1;overflow-y:auto;padding:6px 0;}
  .section-label{padding:6px 14px 3px;font-size:9px;color:#9f83b7;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;}
  .pose-item{padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s,border 0.1s;border-left:2px solid transparent;}
  .pose-item:hover{background:#120615;}
  .pose-item.selected{background:#340f3a;border-left-color:#f472b6;}
  .pose-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .pose-dot.start{background:#ec4899;}
  .pose-dot.end{background:#fb7185;}
  .pose-dot.waypoint{background:#f9a8d4;}
  .pose-info{flex:1;min-width:0;}
  .pose-name{font-size:11px;font-family:'JetBrains Mono',monospace;color:#f4e6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pose-coords{font-size:9px;color:#b39bd6;font-family:'JetBrains Mono',monospace;margin-top:1px;}
  .pose-delete{opacity:0;font-size:13px;color:#fb7185;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;transition:opacity 0.15s;}
  .pose-item:hover .pose-delete{opacity:1;}
  #inspector{padding:10px;border-top:1px solid #2d0d2c;background:#0f0816;}
  #inspector h3{font-size:9px;color:#b296d0;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
  .insp-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
  .insp-row label{font-size:10px;color:#c7b2e5;font-family:'JetBrains Mono',monospace;width:30px;flex-shrink:0;}
  .insp-row input{flex:1;background:#120819;border:1px solid #2d0d2c;border-radius:4px;color:#f8edff;font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 7px;outline:none;transition:border 0.15s;width:0;}
  .insp-row input:focus{border-color:#f472b6;}
  #canvas-wrap{flex:1;position:relative;overflow:hidden;}
  canvas{display:block;}
  #status{position:absolute;bottom:10px;left:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#a37cbf;pointer-events:none;user-select:none;}
  #hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#100613dd;border:1px solid #2d0d2c;border-radius:6px;padding:6px 14px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#b9a2d6;pointer-events:none;white-space:nowrap;}
  #zoom-controls{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:4px;}
  .zoom-btn{width:28px;height:28px;background:#120819;border:1px solid #2d0d2c;border-radius:4px;color:#b9a1d6;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:'JetBrains Mono',monospace;}
  .zoom-btn:hover{background:#2a0f33;color:#f9c1e9;border-color:#f472b6;}
  #path-mode{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
  .pm-btn{padding:5px 11px;background:#120819;border:1px solid #2d0d2c;border-radius:4px;color:#b9a1d6;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s;}
  .pm-btn:hover{border-color:#f472b6;color:#f9c1e9;}
  .pm-btn.active{background:#40143f;border-color:#f472b6;color:#f9a8d4;}
  #export-btn{margin:8px 10px 10px;padding:7px;background:#3b0f3a;border:1px solid #8b5cf6;border-radius:5px;color:#f9c1e9;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;text-align:center;transition:all 0.15s;}
  #export-btn:hover{background:#5e1774;border-color:#f472b6;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#09050d;}
  ::-webkit-scrollbar-thumb{background:#3c123c;border-radius:2px;}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Path Kitty!</h1>
      <p>FRC Path Builder · 2026</p>
    </div>
    <div id="tools">
      <div class="tool-label">Mode</div>
      <div class="tool-row">
        <button class="tool-btn active" id="btn-add" onclick="setMode('add')">＋ Add</button>
        <button class="tool-btn" id="btn-select" onclick="setMode('select')">↖ Select</button>
        <button class="tool-btn" id="btn-pan" onclick="setMode('pan')">✥ Pan</button>
      </div>
      <div class="tool-row" style="margin-top:6px;">
        <button class="tool-btn" onclick="setPathMode('bezier')" id="pm-bezier-s" style="flex:1">〜 Bézier</button>
        <button class="tool-btn" onclick="setPathMode('linear')" id="pm-linear-s" style="flex:1">/ Linear</button>
      </div>
      <div class="tool-row" style="margin-top:6px;">
        <button class="tool-btn danger" onclick="clearAll()" style="flex:1">⌫ Clear All</button>
      </div>
    </div>
    <div class="section-label">Poses</div>
    <div id="pose-list"></div>
    <button id="export-btn" onclick="exportJSON()">⬇ Export WPILib JSON</button>
    <div id="inspector">
      <h3>Inspector</h3>
      <div id="insp-content" style="color:#374151;font-size:10px;font-family:'JetBrains Mono',monospace;">No pose selected</div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="hint">Click to place · Drag to move · Scroll on pose to rotate · Right-click to delete</div>
    <div id="status"></div>
    <div id="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1.2)">+</button>
      <button class="zoom-btn" onclick="zoom(0.833)">−</button>
      <button class="zoom-btn" onclick="resetView()" style="font-size:11px;" title="Reset view">⌂</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

//Field Image
const fieldImg = new Image();
fieldImg.src = 'field2026.png'; // put the image file in the same folder as your HTML
fieldImg.onload = () => draw();

let poses = [];
let selected = null;
let mode = 'add';
let pathMode = 'bezier';
let view = { x: 0, y: 0, scale: 1 };
let dragging = null;
let panning = false;
let panStart = null;
let idCounter = 0;

const FIELD_W = 16.54, FIELD_H = 8.21;
const PPM = 60; // pixels per meter base

function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}

function resetView() {
  const fw = FIELD_W * PPM, fh = FIELD_H * PPM;
  const s = Math.min((canvas.width - 40) / fw, (canvas.height - 40) / fh);
  view.scale = s;
  view.x = (canvas.width - fw * s) / 2;
  view.y = (canvas.height - fh * s) / 2;
  draw();
}

function zoom(f) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  view.x = cx + (view.x - cx) * f;
  view.y = cy + (view.y - cy) * f;
  view.scale *= f;
  draw();
}

function toCanvas(fx, fy) {
  return { x: view.x + fx * PPM * view.scale, y: view.y + (FIELD_H - fy) * PPM * view.scale };
}

function toField(cx, cy) {
  return { x: (cx - view.x) / (PPM * view.scale), y: FIELD_H - (cy - view.y) / (PPM * view.scale) };
}

function setMode(m) {
  mode = m;
  ['add','select','pan'].forEach(k => document.getElementById('btn-'+k).classList.toggle('active', k===m));
  canvas.style.cursor = m === 'pan' ? 'grab' : 'crosshair';
}

function setPathMode(m) {
  pathMode = m;
  document.getElementById('pm-bezier-s').classList.toggle('active', m==='bezier');
  document.getElementById('pm-linear-s').classList.toggle('active', m==='linear');
  draw();
}

function clearAll() {
  if (poses.length === 0 || confirm('Clear all poses?')) { poses = []; selected = null; updateSidebar(); draw(); }
}

function refreshTypes() {
  poses.forEach((p, i) => {
    p.type = i === 0 ? 'start' : i === poses.length - 1 ? 'end' : 'waypoint';
    if (poses.length === 1) p.type = 'start';
  });
}

function addPose(fx, fy) {
  const p = { id: idCounter++, x: fx, y: fy, heading: 0, name: `Pose ${idCounter}`, type: 'waypoint' };
  poses.push(p);
  refreshTypes();
  selected = p.id;
  updateSidebar();
  draw();
}

function deletePose(id) {
  poses = poses.filter(p => p.id !== id);
  refreshTypes();
  if (selected === id) selected = null;
  updateSidebar();
  draw();
}

function getPoseAt(cx, cy, r = 18) {
  for (let i = poses.length - 1; i >= 0; i--) {
    const p = poses[i];
    const c = toCanvas(p.x, p.y);
    if (Math.hypot(cx - c.x, cy - c.y) < r) return p;
  }
  return null;
}

function cpFor(p0, p1) {
  const d = Math.hypot(p1.x - p0.x, p1.y - p0.y) * 0.4;
  return {
    cp0x: p0.x + Math.cos(p0.heading) * d, cp0y: p0.y + Math.sin(p0.heading) * d,
    cp1x: p1.x - Math.cos(p1.heading) * d, cp1y: p1.y - Math.sin(p1.heading) * d
  };
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d0f14';
  ctx.fillRect(0, 0, W, H);

  const fw = FIELD_W * PPM * view.scale, fh = FIELD_H * PPM * view.scale;

  // // Field
  // ctx.fillStyle = '#0e1620';
  // ctx.fillRect(view.x, view.y, fw, fh);

  // // Grid
  // ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 0.5;
  // for (let mx = 0; mx <= FIELD_W; mx++) { const c = toCanvas(mx, 0); ctx.beginPath(); ctx.moveTo(c.x, view.y); ctx.lineTo(c.x, view.y + fh); ctx.stroke(); }
  // for (let my = 0; my <= FIELD_H; my++) { const c = toCanvas(0, my); ctx.beginPath(); ctx.moveTo(view.x, c.y); ctx.lineTo(view.x + fw, c.y); ctx.stroke(); }

  // // Field border
  // ctx.strokeStyle = '#1e3a5f'; ctx.lineWidth = 2;
  // ctx.strokeRect(view.x, view.y, fw, fh);

  // // Center line
  // const cm = toCanvas(FIELD_W / 2, 0);
  // ctx.strokeStyle = '#1e3a5f66'; ctx.lineWidth = 1; ctx.setLineDash([8, 5]);
  // ctx.beginPath(); ctx.moveTo(cm.x, view.y); ctx.lineTo(cm.x, view.y + fh); ctx.stroke();
  // ctx.setLineDash([]);

  // // Alliance zones
  // const aw = 3 * PPM * view.scale;
  // ctx.fillStyle = '#1e3a5f33'; ctx.fillRect(view.x, view.y, aw, fh);
  // ctx.fillStyle = '#5f1e1e33'; ctx.fillRect(view.x + fw - aw, view.y, aw, fh);
  

  //Field
  ctx.drawImage(fieldImg, view.x, view.y, fw, fh);

  // Draw path
  if (poses.length >= 2) {
    ctx.save();
    ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 2.5;
    ctx.shadowColor = '#f472b6aa'; ctx.shadowBlur = 10;
    ctx.beginPath();
    const c0 = toCanvas(poses[0].x, poses[0].y);
    ctx.moveTo(c0.x, c0.y);
    for (let i = 0; i < poses.length - 1; i++) {
      const c1 = toCanvas(poses[i+1].x, poses[i+1].y);
      if (pathMode === 'bezier') {
        const cp = cpFor(poses[i], poses[i+1]);
        const a = toCanvas(cp.cp0x, cp.cp0y), b = toCanvas(cp.cp1x, cp.cp1y);
        ctx.bezierCurveTo(a.x, a.y, b.x, b.y, c1.x, c1.y);
      } else {
        ctx.lineTo(c1.x, c1.y);
      }
    }
    ctx.stroke(); ctx.restore();

    // Bezier handles
    if (pathMode === 'bezier') {
      for (let i = 0; i < poses.length - 1; i++) {
        const cp = cpFor(poses[i], poses[i+1]);
        const a = toCanvas(cp.cp0x, cp.cp0y), b = toCanvas(cp.cp1x, cp.cp1y);
        const c0c = toCanvas(poses[i].x, poses[i].y), c1c = toCanvas(poses[i+1].x, poses[i+1].y);
        ctx.strokeStyle = '#f472b640'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(c0c.x, c0c.y); ctx.lineTo(a.x, a.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(c1c.x, c1c.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#f472b688';
        ctx.beginPath(); ctx.arc(a.x, a.y, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  // Draw poses
  poses.forEach((p, i) => {
    const c = toCanvas(p.x, p.y);
    const isSel = p.id === selected;
    const s = view.scale;
    const col = p.type === 'start' ? '#f472b6' : p.type === 'end' ? '#fb7185' : '#f9a8d4';

    // Selection glow
    if (isSel) {
      ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = 20;
      ctx.strokeStyle = col + '66'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(c.x, c.y, 16 * s, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Robot rectangle
    ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(-p.heading);
    const rw = 15 * s, rh = 12 * s;
    ctx.fillStyle = isSel ? col + '2a' : '#161c2a';
    ctx.strokeStyle = col; ctx.lineWidth = isSel ? 2 : 1.5;
    ctx.beginPath(); ctx.rect(-rw/2, -rh/2, rw, rh); ctx.fill(); ctx.stroke();
    // Front marker
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.rect(rw/2 - 3*s, -2*s, 3*s, 4*s); ctx.fill();
    ctx.restore();

    // Heading arrow
    ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(-p.heading);
    ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 1.5;
    const al = 22 * s;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(al, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(al, 0); ctx.lineTo(al - 6*s, -3.5*s); ctx.lineTo(al - 6*s, 3.5*s); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Index number
    const fs = Math.max(9, 11 * s);
    ctx.fillStyle = '#e2e8f0cc'; ctx.font = `bold ${fs}px "JetBrains Mono", monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, c.x, c.y - 16 * s);
  });

  // Status
  document.getElementById('status').textContent =
    `poses: ${poses.length}  ·  mode: ${mode}  ·  path: ${pathMode}  ·  zoom: ${(view.scale * 100).toFixed(0)}%`;
}

function updateSidebar() {
  const list = document.getElementById('pose-list');
  list.innerHTML = '';
  poses.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'pose-item' + (p.id === selected ? ' selected' : '');
    div.innerHTML = `
      <div class="pose-dot ${p.type}"></div>
      <div class="pose-info">
        <div class="pose-name">${i+1}. ${p.name}</div>
        <div class="pose-coords">(${p.x.toFixed(2)}, ${p.y.toFixed(2)}) · ${(p.heading*180/Math.PI).toFixed(1)}°</div>
      </div>
      <button class="pose-delete" onclick="event.stopPropagation();deletePose(${p.id})">✕</button>`;
    div.onclick = () => { selected = p.id; updateSidebar(); draw(); updateInspector(); };
    list.appendChild(div);
  });
  updateInspector();
}

function updateInspector() {
  const el = document.getElementById('insp-content');
  const p = poses.find(p => p.id === selected);
  if (!p) { el.innerHTML = '<span style="color:#374151">No pose selected</span>'; return; }
  el.innerHTML = `
    <div class="insp-row"><label>Name</label><input id="inp-name" value="${p.name}"></div>
    <div class="insp-row"><label>X</label><input id="inp-x" type="number" step="0.01" value="${p.x.toFixed(3)}">
    <label style="width:20px;text-align:center;">Y</label><input id="inp-y" type="number" step="0.01" value="${p.y.toFixed(3)}"></div>
    <div class="insp-row"><label>θ°</label><input id="inp-h" type="number" step="1" value="${(p.heading*180/Math.PI).toFixed(1)}"></div>`;
  document.getElementById('inp-name').oninput = e => { p.name = e.target.value; updateSidebar(); };
  document.getElementById('inp-x').oninput = e => { p.x = parseFloat(e.target.value)||0; draw(); updateSidebar(); };
  document.getElementById('inp-y').oninput = e => { p.y = parseFloat(e.target.value)||0; draw(); updateSidebar(); };
  document.getElementById('inp-h').oninput = e => { p.heading = (parseFloat(e.target.value)||0)*Math.PI/180; draw(); updateSidebar(); };
}

function exportJSON() {
  const data = {
    waypoints: poses.map((p, i) => ({
      index: i,
      name: p.name,
      x: parseFloat(p.x.toFixed(4)),
      y: parseFloat(p.y.toFixed(4)),
      heading: parseFloat((p.heading * 180 / Math.PI).toFixed(2)),
      type: p.type
    })),
    pathMode
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'path.json';
  a.click();
}

// Mouse events
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const hit = getPoseAt(cx, cy);
  if (e.button === 1 || mode === 'pan') {
    panning = true; panStart = { x: cx - view.x, y: cy - view.y };
    canvas.style.cursor = 'grabbing'; return;
  }
  if (mode === 'add' && !hit) {
    const f = toField(cx, cy);
    if (f.x >= 0 && f.x <= FIELD_W && f.y >= 0 && f.y <= FIELD_H) addPose(f.x, f.y);
    return;
  }
  if (hit) {
    selected = hit.id;
    dragging = { pose: hit, ox: cx - toCanvas(hit.x, hit.y).x, oy: cy - toCanvas(hit.x, hit.y).y };
    canvas.style.cursor = 'grabbing';
    updateSidebar(); draw();
  } else {
    selected = null; updateSidebar(); draw();
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  if (panning) { view.x = cx - panStart.x; view.y = cy - panStart.y; draw(); return; }
  if (dragging) {
    const f = toField(cx - dragging.ox, cy - dragging.oy);
    dragging.pose.x = Math.max(0, Math.min(FIELD_W, f.x));
    dragging.pose.y = Math.max(0, Math.min(FIELD_H, f.y));
    updateSidebar(); draw(); return;
  }
  if (mode !== 'pan') canvas.style.cursor = getPoseAt(cx, cy) ? 'grab' : 'crosshair';
});

canvas.addEventListener('mouseup', () => {
  dragging = null; panning = false;
  canvas.style.cursor = mode === 'pan' ? 'grab' : 'crosshair';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const hit = getPoseAt(cx, cy, 24);
  if (hit) {
    hit.heading += e.deltaY * 0.008;
    updateSidebar(); draw();
  } else {
    const f = e.deltaY < 0 ? 1.1 : 0.91;
    view.x = cx + (view.x - cx) * f; view.y = cy + (view.y - cy) * f; view.scale *= f;
    draw();
  }
}, { passive: false });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const hit = getPoseAt(e.clientX - rect.left, e.clientY - rect.top);
  if (hit) deletePose(hit.id);
});

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Delete' || e.key === 'Backspace') { if (selected !== null) deletePose(selected); }
  if (e.key === 'a') setMode('add');
  if (e.key === 's') setMode('select');
  if (e.key === 'p') setMode('pan');
  if (e.key === 'Escape') { selected = null; updateSidebar(); draw(); }
});

new ResizeObserver(resize).observe(wrap);
